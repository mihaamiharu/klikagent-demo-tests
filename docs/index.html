<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Playwright Test Dashboard</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <h1>Playwright Test Dashboard</h1>
    <div class="header-actions">
      <select id="branchFilter">
        <option value="">All Branches</option>
      </select>
      <select id="statusFilter">
        <option value="">All Status</option>
        <option value="passed">Passed</option>
        <option value="failed">Failed</option>
        <option value="skipped">Skipped</option>
      </select>
      <button id="refreshBtn" class="btn">Refresh</button>
    </div>
  </header>

  <main>
    <section id="summary" class="summary">
      <div class="stat-card total">
        <span class="stat-value" id="totalRuns">-</span>
        <span class="stat-label">Total Runs</span>
      </div>
      <div class="stat-card passed">
        <span class="stat-value" id="passedRuns">-</span>
        <span class="stat-label">Passed</span>
      </div>
      <div class="stat-card failed">
        <span class="stat-value" id="failedRuns">-</span>
        <span class="stat-label">Failed</span>
      </div>
      <div class="stat-card tests">
        <span class="stat-value" id="totalTests">-</span>
        <span class="stat-label">Total Tests</span>
      </div>
      <div class="stat-card pass-rate">
        <span class="stat-value" id="passRate">-</span>
        <span class="stat-label">Pass Rate</span>
      </div>
    </section>

    <section id="runList" class="run-list">
      <div class="loading">Loading test data...</div>
    </section>

    <section id="runDetail" class="run-detail hidden">
      <button id="backBtn" class="btn btn-secondary">&larr; Back to List</button>
      <div id="runHeader"></div>
      <div id="testList"></div>
    </section>
  </main>

  <div id="testModal" class="modal hidden">
    <div class="modal-content">
      <span class="modal-close">&times;</span>
      <div id="modalContent"></div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
