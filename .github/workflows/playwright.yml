name: Playwright Tests

on:
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Download existing dashboard data
        run: |
          if gh api repos/${{ github.repository }}/contents/docs/dashboard-data.json --ref main -q '.content' 2>/dev/null | base64 -d > docs/dashboard-data.json 2>/dev/null; then
            echo "Downloaded existing dashboard data"
          else
            echo '{"lastUpdated": null, "runs": []}' > docs/dashboard-data.json
            echo "Initialized new dashboard data"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - run: npm ci

      - uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps

      - name: Install Playwright system dependencies only
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps

      - name: Run Playwright tests
        run: npx playwright test --pass-with-no-tests
        env:
          DASHBOARD_OUTPUT_DIR: ${{ github.workspace }}

      - name: Update dashboard data
        run: node utils/update-dashboard.js

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: |
            playwright-report/
            run-result.json
          retention-days: 14

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dashboard-data
          path: |
            docs/
            test-results/
          retention-days: 30

      - name: Report to KlikAgent
        if: always()
        run: |
          TASK_ID=$(echo "${{ github.ref_name }}" | sed 's|qa/||' | cut -d'-' -f1)
          PASSED=$([[ "${{ job.status }}" == "success" ]] && echo "true" || echo "false")
          curl -X POST "${{ secrets.KLIKAGENT_URL }}/tasks/${TASK_ID}/results" \
            -H "Content-Type: application/json" \
            -d "{
              \"taskId\": \"${TASK_ID}\",
              \"passed\": ${PASSED},
              \"summary\": \"Playwright run ${{ job.status }} on ${{ github.ref_name }}\",
              \"reportUrl\": \"https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\"
            }"
        env:
          KLIKAGENT_URL: ${{ secrets.KLIKAGENT_URL }}
