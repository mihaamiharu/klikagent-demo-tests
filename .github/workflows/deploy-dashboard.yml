name: Deploy Dashboard

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Playwright Tests"]
    types: [completed]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  deploy:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' || github.event.workflow_run.conclusion == 'failure'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Download dashboard artifact from triggering run
        if: github.event_name == 'workflow_run'
        uses: actions/download-artifact@v4
        with:
          name: dashboard-data
          path: docs/
          workflow-run-id: ${{ github.event.workflow_run.id }}

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Commit updated dashboard data to main
        if: github.event_name == 'workflow_run'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add docs/dashboard-data.json
          git diff --staged --quiet || git commit -m "Update dashboard data [skip ci]"
          git push