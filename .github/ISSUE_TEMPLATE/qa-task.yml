name: QA Task
description: Ask KlikAgent to generate a Playwright spec for this feature
title: "[QA] "
labels: ["klikagent"]
body:
  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance Criteria
      description: Describe what should be tested — the expected behavior, happy path, edge cases.
      placeholder: |
        - User can log in with valid credentials and is redirected to the dashboard
        - A welcome message with the user's name is visible after login
    validations:
      required: true

  - type: dropdown
    id: feature
    attributes:
      label: Feature
      description: Which feature area does this test belong to?
      options:
        - auth
        - dashboard
        - doctors
        - patients
        - appointments
        - records
        - departments
    validations:
      required: true

  - type: input
    id: qa-env-url
    attributes:
      label: QA Environment URL
      description: Base URL of the app to test against.
      value: https://app.testingwithekki.com
    validations:
      required: true

  - type: input
    id: output-repo
    attributes:
      label: Output Repo
      description: GitHub repo where the generated spec and POM will be committed.
      value: klikagent-demo-tests
    validations:
      required: true
